<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ToolZoneX</title>
    <script type="text/javascript">
      // GitHub Pages SPA routing fix.
      // When GitHub Pages 404s a deep link (e.g. /toolzonex/finance/emi-calculator),
      // it serves this file. We encode the path as a query string and redirect to
      // index.html which React Router then decodes and renders the correct route.
      //
      // pathSegmentsToKeep = 1  →  keeps '/toolzonex' as the base prefix.
      // Set to 0 only if the site is deployed at the domain root (custom domain).
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
